name: Deploy Housework Simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Pages on first deployment
        id: enable_pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pages" >/dev/null 2>&1 || \
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" -f build_type=workflow

      - name: Configure Pages
        id: configure_pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        id: upload_pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment result
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          data = {
              "outcome": os.environ.get("DEPLOY_OUTCOME") or "not-run",
              "page_url": os.environ.get("PAGE_URL") or "",
              "commit": os.environ.get("GITHUB_SHA") or "",
              "deployed_at": datetime.now(timezone.utc).isoformat(),
          }
          with open("deployment-status.json", "w", encoding="utf-8") as file:
              json.dump(data, file, ensure_ascii=False, indent=2)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.json
          git commit -m "Record Pages deployment [skip ci]" || exit 0
          git push origin HEAD:gh-pages
